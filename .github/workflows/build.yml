name: Chrome Extensions — Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'profile-guardian-v*'
      - 'trufo-v*'
  pull_request:
    branches: [main]

jobs:
  # Detect which extensions have changed (or which tag was pushed)
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      profile-guardian: ${{ steps.filter.outputs.profile-guardian }}
      trufo: ${{ steps.filter.outputs.trufo }}
    steps:
      - uses: actions/checkout@v4
      - name: Path & tag filter
        id: filter
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/profile-guardian-v* ]]; then
            echo "profile-guardian=true" >> $GITHUB_OUTPUT
            echo "trufo=false" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/trufo-v* ]]; then
            echo "profile-guardian=false" >> $GITHUB_OUTPUT
            echo "trufo=true" >> $GITHUB_OUTPUT
          else
            # Check changed files for branch pushes / PRs
            git fetch origin main --depth=1 2>/dev/null || true
            BASE="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
            CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
            echo "profile-guardian=$(echo "$CHANGED" | grep -q '^profile-guardian/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "trufo=$(echo "$CHANGED" | grep -q '^trufo/' && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  profile-guardian:
    name: Profile Guardian
    needs: changes
    if: needs.changes.outputs.profile-guardian == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: profile-guardian
        run: npm install

      - name: Generate icons
        working-directory: profile-guardian
        run: npm run icons

      - name: Validate
        working-directory: profile-guardian
        run: node scripts/build.js

      - name: Package zip
        working-directory: profile-guardian
        run: npm run zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-guardian-extension
          path: profile-guardian/dist/*.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/profile-guardian-v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Profile Guardian ${{ github.ref_name }}"
          files: profile-guardian/dist/*.zip
          generate_release_notes: true

  trufo:
    name: Trufo
    needs: changes
    if: needs.changes.outputs.trufo == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: trufo
        run: npm install

      - name: Generate icons
        working-directory: trufo
        run: npm run icons

      - name: Validate
        working-directory: trufo
        run: node scripts/build.js

      - name: Package zip
        working-directory: trufo
        run: npm run zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trufo-extension
          path: trufo/dist/*.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/trufo-v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Trufo ${{ github.ref_name }}"
          files: trufo/dist/*.zip
          generate_release_notes: true
