name: Chrome Extensions — Build & Release

on:
  workflow_dispatch:
    inputs:
      extension:
        description: 'Extension to build'
        required: true
        type: choice
        options:
          - all
          - profile-guardian
          - trufo
      bump:
        description: 'Version bump'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Detect which extensions to build ───────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      profile-guardian: ${{ steps.filter.outputs.profile-guardian }}
      trufo: ${{ steps.filter.outputs.trufo }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Path filter
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHOICE="${{ github.event.inputs.extension }}"
            echo "profile-guardian=$([[ "$CHOICE" == "all" || "$CHOICE" == "profile-guardian" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "trufo=$([[ "$CHOICE" == "all" || "$CHOICE" == "trufo" ]] && echo true || echo false)"                       >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          else
            BASE="${{ github.event.before }}"
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed: $CHANGED"
          echo "profile-guardian=$(echo "$CHANGED" | grep -q '^profile-guardian/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "trufo=$(echo "$CHANGED"            | grep -q '^trufo/'             && echo true || echo false)" >> $GITHUB_OUTPUT

  # ── Profile Guardian ────────────────────────────────────────────────────────
  profile-guardian:
    needs: changes
    if: needs.changes.outputs.profile-guardian == 'true'
    uses: maimon33/infra/.github/workflows/chrome-extension-release.yml@main
    with:
      extension_name: "Profile Guardian"
      extension_dir: "profile-guardian"
      tag_prefix: "profile-guardian-v"
      bump: ${{ github.event.inputs.bump || 'patch' }}
      create_release: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
    secrets: inherit
    permissions:
      contents: write

  # ── Trufo ───────────────────────────────────────────────────────────────────
  trufo:
    needs: changes
    if: needs.changes.outputs.trufo == 'true'
    uses: maimon33/infra/.github/workflows/chrome-extension-release.yml@main
    with:
      extension_name: "Trufo"
      extension_dir: "trufo"
      tag_prefix: "trufo-v"
      bump: ${{ github.event.inputs.bump || 'patch' }}
      create_release: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
    secrets: inherit
    permissions:
      contents: write
