name: Chrome Extensions — Build & Release

on:
  workflow_dispatch:
    inputs:
      extension:
        description: 'Extension to build'
        required: true
        type: choice
        options:
          - all
          - profile-guardian
          - trufo
      bump:
        description: 'Version bump (manual dispatch only)'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
  push:
    branches: [main]
    tags:
      - 'profile-guardian-v*'
      - 'trufo-v*'
  pull_request:
    branches: [main]

jobs:
  # ── Detect which extensions to build ───────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      profile-guardian: ${{ steps.filter.outputs.profile-guardian }}
      trufo: ${{ steps.filter.outputs.trufo }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Path & tag filter
        id: filter
        run: |
          # Manual dispatch — respect the dropdown choice
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHOICE="${{ github.event.inputs.extension }}"
            echo "profile-guardian=$([[ "$CHOICE" == "all" || "$CHOICE" == "profile-guardian" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "trufo=$([[ "$CHOICE" == "all" || "$CHOICE" == "trufo" ]] && echo true || echo false)"                       >> $GITHUB_OUTPUT
            exit 0
          fi

          # Tag push
          if [[ "${GITHUB_REF}" == refs/tags/profile-guardian-v* ]]; then
            echo "profile-guardian=true" >> $GITHUB_OUTPUT
            echo "trufo=false"            >> $GITHUB_OUTPUT
            exit 0
          fi
          if [[ "${GITHUB_REF}" == refs/tags/trufo-v* ]]; then
            echo "profile-guardian=false" >> $GITHUB_OUTPUT
            echo "trufo=true"             >> $GITHUB_OUTPUT
            exit 0
          fi

          # Branch push or PR — diff against base
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          else
            BASE="${{ github.event.before }}"
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files: $CHANGED"

          echo "profile-guardian=$(echo "$CHANGED" | grep -q '^profile-guardian/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "trufo=$(echo "$CHANGED"            | grep -q '^trufo/'             && echo true || echo false)" >> $GITHUB_OUTPUT

  # ── Profile Guardian ────────────────────────────────────────────────────────
  profile-guardian:
    name: Profile Guardian
    needs: changes
    if: needs.changes.outputs.profile-guardian == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: version
        working-directory: profile-guardian
        run: |
          CURRENT=$(node -p "require('./manifest.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ github.event.inputs.bump }}" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              *)     PATCH=$((PATCH+1)) ;;
            esac
            NEW="$MAJOR.$MINOR.$PATCH"

            # Write bumped version back into manifest.json
            node -e "
              const fs = require('fs');
              const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
              m.version = '$NEW';
              fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
            "

            # Commit the bump back to main [skip ci] avoids re-triggering
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add manifest.json
            git commit -m "chore(profile-guardian): bump version to $NEW [skip ci]"
            git push

          elif [[ "${GITHUB_REF}" == refs/tags/profile-guardian-v* ]]; then
            NEW="${GITHUB_REF#refs/tags/profile-guardian-v}"
          else
            NEW="$CURRENT"
          fi

          echo "new=$NEW"                     >> $GITHUB_OUTPUT
          echo "tag=profile-guardian-v$NEW"   >> $GITHUB_OUTPUT

      - name: Install dependencies
        working-directory: profile-guardian
        run: npm install

      - name: Generate icons
        working-directory: profile-guardian
        run: npm run icons

      - name: Validate
        working-directory: profile-guardian
        run: node scripts/build.js

      - name: Package zip
        working-directory: profile-guardian
        run: npm run zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-guardian-extension
          path: profile-guardian/dist/*.zip
          retention-days: 30

      - name: Create GitHub Release
        if: >
          github.event_name == 'workflow_dispatch' ||
          startsWith(github.ref, 'refs/tags/profile-guardian-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Profile Guardian v${{ steps.version.outputs.new }}"
          files: profile-guardian/dist/*.zip
          generate_release_notes: true

  # ── Trufo ────────────────────────────────────────────────────────────────
  trufo:
    name: Trufo
    needs: changes
    if: needs.changes.outputs.trufo == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: version
        working-directory: trufo
        run: |
          CURRENT=$(node -p "require('./manifest.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ github.event.inputs.bump }}" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              *)     PATCH=$((PATCH+1)) ;;
            esac
            NEW="$MAJOR.$MINOR.$PATCH"

            node -e "
              const fs = require('fs');
              const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
              m.version = '$NEW';
              fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
            "

            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add manifest.json
            git commit -m "chore(trufo): bump version to $NEW [skip ci]"
            git push

          elif [[ "${GITHUB_REF}" == refs/tags/trufo-v* ]]; then
            NEW="${GITHUB_REF#refs/tags/trufo-v}"
          else
            NEW="$CURRENT"
          fi

          echo "new=$NEW"           >> $GITHUB_OUTPUT
          echo "tag=trufo-v$NEW"    >> $GITHUB_OUTPUT

      - name: Install dependencies
        working-directory: trufo
        run: npm install

      - name: Generate icons
        working-directory: trufo
        run: npm run icons

      - name: Validate
        working-directory: trufo
        run: node scripts/build.js

      - name: Package zip
        working-directory: trufo
        run: npm run zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trufo-extension
          path: trufo/dist/*.zip
          retention-days: 30

      - name: Create GitHub Release
        if: >
          github.event_name == 'workflow_dispatch' ||
          startsWith(github.ref, 'refs/tags/trufo-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Trufo v${{ steps.version.outputs.new }}"
          files: trufo/dist/*.zip
          generate_release_notes: true
