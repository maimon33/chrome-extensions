name: Profile Guardian — Build & Release

on:
  push:
    branches: [main]
    tags: ['profile-guardian-v*']
    paths: ['profile-guardian/**']
  pull_request:
    branches: [main]
    paths: ['profile-guardian/**']

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: profile-guardian
        run: npm install

      - name: Generate icons
        working-directory: profile-guardian
        run: npm run icons

      - name: Validate extension
        working-directory: profile-guardian
        run: node scripts/build.js

      - name: Package zip
        working-directory: profile-guardian
        run: npm run zip

      # Always upload as a downloadable artifact (available on every run)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-guardian-extension
          path: profile-guardian/dist/*.zip
          retention-days: 30

      # On tagged release (profile-guardian-v*), publish to GitHub Releases
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/profile-guardian-v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Profile Guardian ${{ github.ref_name }}"
          files: profile-guardian/dist/*.zip
          generate_release_notes: true
