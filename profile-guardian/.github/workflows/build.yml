name: Build & Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chrome-extensions/profile-guardian/package-lock.json

      - name: Install dependencies
        working-directory: chrome-extensions/profile-guardian
        run: npm ci

      - name: Generate icons
        working-directory: chrome-extensions/profile-guardian
        run: npm run icons

      - name: Validate extension
        working-directory: chrome-extensions/profile-guardian
        run: node scripts/build.js

      - name: Package zip
        working-directory: chrome-extensions/profile-guardian
        run: npm run zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-guardian-extension
          path: chrome-extensions/profile-guardian/dist/*.zip
          retention-days: 30

  # On tagged releases, create a GitHub Release with the zip attached
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: profile-guardian-extension
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
