<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Guardian</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="logo">
      <img src="../../icons/icon48.png" alt="Shield" width="24" height="24" />
      <span>Profile Guardian</span>
    </div>
    <span id="status-badge" class="badge active">Active</span>
  </header>

  <section class="stat-row">
    <div class="stat">
      <span id="stat-total" class="stat-num">0</span>
      <span class="stat-label">Blocked Total</span>
    </div>
    <div class="stat">
      <span id="stat-week" class="stat-num">0</span>
      <span class="stat-label">This Week</span>
    </div>
    <div class="stat">
      <span id="stat-ext" class="stat-num">0</span>
      <span class="stat-label">New Extensions</span>
    </div>
  </section>

  <section class="recent">
    <h3>Recent Blocks</h3>
    <ul id="recent-list">
      <li class="empty">No blocks yet</li>
    </ul>
  </section>

  <footer>
    <button id="btn-options" class="btn-secondary">Settings &amp; History</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
